name: forensicflow

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    command:
      ["postgres", "-c", "shared_preload_libraries=timescaledb", "-c", "max_wal_size=4GB"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forensicflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forensicflow}
      POSTGRES_DB: ${POSTGRES_DB:-forensicflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-ForensicFlowDev123!}
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://forensicflow:forensicflow@postgres:5432/forensicflow
      OPENSEARCH_URL: http://opensearch:9200
      SEARCH_BACKEND: opensearch
      REDIS_URL: redis://redis:6379/0
      EVIDENCE_ROOT: /data/evidence
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      SAMPLES_ROOT: /samples
      ENABLE_VALIDATION_API: ${ENABLE_VALIDATION_API:-false}
      ENABLE_ADMIN_API: ${ENABLE_ADMIN_API:-false}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-10737418240}
      EXTRACTED_MAX_FILES: ${EXTRACTED_MAX_FILES:-250000}
      EXTRACTED_MAX_BYTES: ${EXTRACTED_MAX_BYTES:-536870912000}
      DELETE_EVIDENCE_AFTER_INGEST: ${DELETE_EVIDENCE_AFTER_INGEST:-false}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-change-me-dev-auth-secret}
      AUTH_JWT_ALGORITHM: ${AUTH_JWT_ALGORITHM:-HS256}
      AUTH_TOKEN_EXP_MINUTES: ${AUTH_TOKEN_EXP_MINUTES:-480}
      AUTH_BOOTSTRAP_ADMIN_USERNAME: ${AUTH_BOOTSTRAP_ADMIN_USERNAME:-}
      AUTH_BOOTSTRAP_ADMIN_PASSWORD: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:-}
      DOCKER_COMPOSE_PROJECT: ${DOCKER_COMPOSE_PROJECT:-forensicflow}
      CHAINSAW_RULES_ROOT: /opt/chainsaw/rules
      CHAINSAW_MAPPINGS_ROOT: /opt/chainsaw/mappings
      CHAINSAW_ENABLED: ${CHAINSAW_ENABLED:-true}
    volumes:
      - evidence_data:/data/evidence
      - ./samples:/samples:ro
      - chainsaw_rules:/opt/chainsaw/rules:ro
      - chainsaw_mappings:/opt/chainsaw/mappings:ro
      # The admin disk-usage / compose-project features need the host Docker
      # socket, which grants host-root-equivalent access. OFF by default.
      # Mount it only on a trusted host running with ENABLE_ADMIN_API=true:
      #   - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3); d=json.loads(r.read()); assert d.get('status')=='ready', d",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      args:
        INSTALL_OPEN_FORENSICS: ${INSTALL_OPEN_FORENSICS:-false}
        INSTALL_VOLATILITY3: ${INSTALL_VOLATILITY3:-false}
    environment:
      DATABASE_URL: postgresql+psycopg://forensicflow:forensicflow@postgres:5432/forensicflow
      OPENSEARCH_URL: http://opensearch:9200
      SEARCH_BACKEND: opensearch
      REDIS_URL: redis://redis:6379/0
      EVIDENCE_ROOT: /data/evidence
      EZTOOLS_ROOT: /opt/eztools
      SIGMA_RULES_ROOT: /opt/sigma/rules
      SIGMA_RULES_BUNDLED: /opt/sigma-bundled
      SIGMA_REF: ${SIGMA_REF:-master}
      SIGMA_PROFILE: ${SIGMA_PROFILE:-dfir}
      SIGMA_REFRESH_INTERVAL_HOURS: ${SIGMA_REFRESH_INTERVAL_HOURS:-24}
      CHAINSAW_ENABLED: ${CHAINSAW_ENABLED:-true}
      CHAINSAW_INCLUDE_SIGMA: ${CHAINSAW_INCLUDE_SIGMA:-true}
      CHAINSAW_SIGMA_PROFILE: ${CHAINSAW_SIGMA_PROFILE:-dfir}
      CHAINSAW_EVTX_MODE: ${CHAINSAW_EVTX_MODE:-priority}
      CHAINSAW_EVTX_MAX: ${CHAINSAW_EVTX_MAX:-64}
      CHAINSAW_EVTX_PARALLEL: ${CHAINSAW_EVTX_PARALLEL:-4}
      CHAINSAW_EVTX_BATCH_SIZE: ${CHAINSAW_EVTX_BATCH_SIZE:-16}
      CHAINSAW_HUNT_BATCH_TIMEOUT_SECONDS: ${CHAINSAW_HUNT_BATCH_TIMEOUT_SECONDS:-300}
      CHAINSAW_SIGMA_DFIR_CACHE: /opt/sigma/rules-dfir-cache
      CHAINSAW_REF: ${CHAINSAW_REF:-master}
      CHAINSAW_BIN: /usr/local/bin/chainsaw
      CHAINSAW_RULES_ROOT: /opt/chainsaw/rules
      CHAINSAW_MAPPINGS_ROOT: /opt/chainsaw/mappings
      CHAINSAW_RULES_BUNDLED: /opt/chainsaw-bundled
      HINDSIGHT_ENABLED: ${HINDSIGHT_ENABLED:-true}
      HINDSIGHT_BIN: /usr/local/bin/hindsight
      HINDSIGHT_MAX_PROFILES: ${HINDSIGHT_MAX_PROFILES:-8}
      HINDSIGHT_TIMEOUT_SECONDS: ${HINDSIGHT_TIMEOUT_SECONDS:-900}
      PLASO_ENABLED: ${PLASO_ENABLED:-true}
      MAC_APT_ENABLED: ${MAC_APT_ENABLED:-true}
      DELETE_EVIDENCE_AFTER_INGEST: ${DELETE_EVIDENCE_AFTER_INGEST:-false}
    volumes:
      - evidence_data:/data/evidence
      - sigma_rules:/opt/sigma/rules
      - chainsaw_rules:/opt/chainsaw/rules
      - chainsaw_mappings:/opt/chainsaw/mappings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' </proc/1/cmdline | grep -q 'celery .* worker'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  beat:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      args:
        INSTALL_OPEN_FORENSICS: ${INSTALL_OPEN_FORENSICS:-false}
        INSTALL_VOLATILITY3: ${INSTALL_VOLATILITY3:-false}
    command:
      ["celery", "-A", "worker.celery_app", "beat", "--loglevel=info"]
    environment:
      REDIS_URL: redis://redis:6379/0
      SIGMA_RULES_ROOT: /opt/sigma/rules
      SIGMA_RULES_BUNDLED: /opt/sigma-bundled
      SIGMA_REF: ${SIGMA_REF:-master}
      SIGMA_PROFILE: ${SIGMA_PROFILE:-dfir}
      SIGMA_REFRESH_INTERVAL_HOURS: ${SIGMA_REFRESH_INTERVAL_HOURS:-24}
    volumes:
      - sigma_rules:/opt/sigma/rules
      - chainsaw_rules:/opt/chainsaw/rules
      - chainsaw_mappings:/opt/chainsaw/mappings
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' </proc/1/cmdline | grep -q 'celery .* beat'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS: web
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  playwright:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    working_dir: /workspace/apps/web
    environment:
      PLAYWRIGHT_USE_WEBSERVER: "0"
      PLAYWRIGHT_BASE_URL: http://web:5173
      CI: "1"
    volumes:
      - ./:/workspace
    depends_on:
      web:
        condition: service_started

volumes:
  postgres_data:
  evidence_data:
  sigma_rules:
  chainsaw_rules:
  chainsaw_mappings:
  opensearch_data:
