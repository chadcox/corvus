[project]
name = "ff-core"
version = "0.1.0"
description = "ForensicFlow shared schemas and constants"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.10",
]

[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["ff_core*"]
